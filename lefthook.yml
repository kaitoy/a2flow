pre-commit:
  parallel: true
  jobs:
    # NOTE: lefthook matches `glob` against repo-root-relative paths (it does NOT
    # strip `root`), and its `*` crosses `/`. So the glob must include the
    # `backend/` prefix; `backend/*.py` already covers nested files too.
    - name: backend-ruff-lint
      root: backend/
      glob: "backend/*.py"
      run: uv run ruff check .

    - name: backend-ruff-format
      root: backend/
      glob: "backend/*.py"
      run: uv run ruff format --check .

    - name: backend-mypy
      root: backend/
      glob: "backend/*.py"
      run: uv run mypy .

    # Runs in parallel across CPU cores via pytest-xdist (`-n auto` in
    # backend/pyproject.toml's [tool.pytest.ini_options] addopts, worker
    # count capped at 50% of CPU cores by a pytest_xdist_auto_num_workers
    # hook in backend/tests/conftest.py), not just alongside the other
    # lefthook jobs below. The 50% cap leaves cores free for frontend-vitest
    # (capped the same way, see frontend/vitest.config.ts) when a commit
    # touches both backend and frontend files in the same pre-commit run.
    - name: backend-pytest
      root: backend/
      glob: "backend/*.py"
      run: uv run pytest

    # NOTE: lefthook matches `glob` against repo-root-relative paths (it does NOT
    # strip `root`), and its `*` crosses `/`. So the glob must include the
    # `frontend/` prefix, and `frontend/src/*.…` already covers nested files —
    # a `src/**/…` form would skip files directly under src (e.g. middleware.ts).
    - name: frontend-biome
      root: frontend/
      glob: "frontend/src/*.{ts,tsx,js,jsx,json}"
      run: pnpm exec biome ci ./src

    - name: frontend-vitest
      root: frontend/
      glob: "frontend/src/*.{ts,tsx}"
      run: pnpm exec vitest run

pre-push:
  jobs:
    - name: frontend-build
      root: frontend/
      glob: "**/*.{ts,tsx,js,jsx,json,css,mjs}"
      run: pnpm run build
